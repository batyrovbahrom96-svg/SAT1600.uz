services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sat1600
      POSTGRES_USER: sat1600
      POSTGRES_PASSWORD: sat1600
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sat1600 -d sat1600"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://sat1600:sat1600@postgres:5432/sat1600
      JWT_SECRET: replace-this-secret-before-production
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      GRAPH_OUTPUT_DIR: static/graphs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
