<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">David Sarkisov SATTEST result proof</title>
  <desc id="desc">SATTEST-branded result proof for David Sarkisov, 1200 total SAT score, 600 Reading and Writing, 600 Math.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0c"/>
      <stop offset="0.52" stop-color="#151719"/>
      <stop offset="1" stop-color="#080809"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#d6c78c" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <rect x="62" y="62" width="1076" height="1476" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="3"/>
  <rect x="92" y="92" width="1016" height="1416" fill="none" stroke="#d6c78c" stroke-opacity="0.32" stroke-width="1.5"/>
  <path d="M116 224H1084" stroke="url(#line)" stroke-width="3"/>
  <text x="116" y="156" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="8">SATTEST.UZ</text>
  <text x="116" y="198" fill="#d6c78c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="7">VERIFIED RESULT PROOF</text>
  <text x="1084" y="156" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="end">June 5, 2026</text>
  <text x="116" y="320" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="300">David Sarkisov</text>
  <text x="116" y="382" fill="#b8b8b8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500">Student result confirmed with video evidence and score summary.</text>
