  <rect x="116" y="1144" width="968" height="180" fill="#d6c78c" fill-opacity="0.08" stroke="#d6c78c" stroke-opacity="0.34"/>
  <text x="154" y="1214" fill="#d6c78c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" letter-spacing="7">VERIFICATION NOTE</text>
  <text x="154" y="1272" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="500">This is a SATTEST.UZ result proof certificate for marketing transparency.</text>
  <text x="154" y="1314" fill="#b8b8b8" font-family="Inter, Arial, sans-serif" font-size="21">It is not an official College Board score report and is paired with the student's video proof.</text>
  <path d="M116 1408H1084" stroke="url(#line)" stroke-width="3"/>
  <text x="116" y="1470" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">SATTEST.UZ Result Proof</text>
  <text x="1084" y="1470" fill="#b8b8b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" text-anchor="end">Reading/Writing 600 | Math 600</text>
