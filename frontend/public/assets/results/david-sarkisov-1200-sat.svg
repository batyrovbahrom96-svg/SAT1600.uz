  <g>
    <rect x="116" y="858" width="460" height="196" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="154" y="926" fill="#a8a8a8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="6">EVIDENCE</text>
    <text x="154" y="984" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Video + result certificate</text>
    <text x="154" y="1026" fill="#b8b8b8" font-family="Inter, Arial, sans-serif" font-size="22">Published in SATTEST Result Proof.</text>
    <rect x="624" y="858" width="460" height="196" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="662" y="926" fill="#a8a8a8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="6">PREPARATION</text>
    <text x="662" y="984" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">SAT preparation route</text>
    <text x="662" y="1026" fill="#b8b8b8" font-family="Inter, Arial, sans-serif" font-size="22">Practice, review, and weak-topic work.</text>
