    <rect x="116" y="462" width="968" height="310" fill="#f4f4f0"/>
    <rect x="116" y="462" width="968" height="310" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <text x="172" y="550" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="5">TOTAL SCORE</text>
    <text x="172" y="690" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="132" font-weight="900">1200</text>
    <text x="508" y="550" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="5">SECTION SCORES</text>
    <text x="508" y="628" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Reading and Writing</text>
    <text x="1018" y="628" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" text-anchor="end">600</text>
    <line x1="508" y1="662" x2="1018" y2="662" stroke="#111111" stroke-opacity="0.22" stroke-width="2"/>
    <text x="508" y="720" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Math</text>
    <text x="1018" y="720" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" text-anchor="end">600</text>
